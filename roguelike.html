<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<meta name="robots" content="index, follow">
	<meta property="og:title" content="バブ・イールの塔壊すべし">
	<meta property="og:description" content="グラブルの皮をかぶったSlay the Spire">
	<meta property="og:image" content="images/icon.jpg">
	<meta property="og:url" content="https://butthar8810.github.io/gbf-dominion/">
	<meta property="og:site_name" content="バブ・イールの塔壊すべし" />
	<meta property="og:locale" content="ja_JP" />
	<meta name="twitter:card" content="summary_large_image">
	<meta name="twitter:site" content="@Butthar_8810">
	<meta name="twitter:title" content="バブ・イールの塔壊すべし">
	<meta name="twitter:description" content="グラブルの皮をかぶったSlay the Spire">
	<meta name="twitter:image" content="images/icon.jpg">

	<link rel="stylesheet" href="css/style.css">
	<script src="https://code.jquery.com/jquery-3.7.1.min.js"
		integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-easing/1.4.1/jquery.easing.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-color/2.1.2/jquery.color.min.js"></script>
	<script src="https://magicant.github.io/sjavascript/mt.js"></script>
    <!-- Swiper CDN読み込み -->
    <link rel="stylesheet" href="https://unpkg.com/swiper@7/swiper-bundle.min.css" />
    <script src="https://unpkg.com/swiper@7/swiper-bundle.min.js"></script>
	<script src="js/parameter.js"></script>
	<script src="js/system.js"></script>
	<script src="js/outGame.js"></script>
	<script src="js/inGame.js"></script>
	<script src="js/animation.js"></script>
	<script src="js/artifact.js"></script>
	<script src="js/readyBonuses.js"></script>
	<script src="js/cardEffect.js"></script>
	<script src="js/enemies.js"></script>
	<script src="js/event.js"></script>

	<link rel="icon" href="images/icon.jpg">
	<title>バブ・イールの塔壊すべし</title>
</head>
<body onload="startGame()">
	<header>
		<div class="header-area">
			<div class="status-area">
				<div class="name-space">ジータ</div>
				<div class="HP-space">
					<img src="images/information/hp.png">
					<span class="remainHp"></span>/
					<span class="maxHp"></span> 
				</div>
				<div class="money-space">
					<img src="images/information/money.jpg">
					<span class="remainMoney"></span>
				</div>
			</div>
			<div></div>
			<div class="artifact-area"></div>
		</div>
	</header>
	<div class="stage-area">
		<div class="rest-area hidden">
			<img src="images/stage_rest.jpg" alt="リスポーン">
			<div class="heal-effect"></div>
			<img class="player-character" src='' alt="プレイヤーキャラ">
		</div>
		<div class="battle-area hidden">
			<img src="images/stage3.jpg" alt="バトルステージ">
			<div class="front-effect"></div>
			<div class="player-area"></div>
			<div class="enemies-area"></div>
			<div class="show-area hidden">
				<div class="show-area-inner"></div>
			</div>
		</div>
	</div>
	<div class="info-area hidden">
		<div class="left-area">
			<div class="energy-area">
				<img src="images/information/action.jpg" alt="デッキ">
				<div class="energy-count">0/0</div>
			</div>
			<div class="deck-area">
				<img src="images/information/deck.png" alt="デッキ">
				<div class="deck-count"></div>
			</div>
		</div>
		<div class="hand-area"></div>
		<div class="right-area">
			<div class="end-btn">
				<img src="images/btn5.png" alt="ターン終了ボタン">
				<span>ターン終了</span>
			</div>
			<div class="trash">
				<div class="trash-area">
					<img src="images/information/trash.png" alt="捨て札">
					<div class="trash-count">0</div>
				</div>
			</div>
		</div>
	</div>
	<div class="talk-area hidden"></div>
	<div class="map-modal">
		<div class="map-modal-body">
		</div>
	</div>
	<div class="black-back-area">
		<div class="trash-decide-area">
			<div class="trash-decide-title"></div>
			<div class="image-btn trash-decide-btn">
				<img src="images/btn2.png" alt="">
				<span>決定</span>
			</div>
		</div>
		<div class="enhance-area">
			<div class="enhance-title"></div>
			<div class="enhance-content"></div>
			<div class="enhance-decide-content hidden"></div>
			<div class="enhance-btn-area">
				<div class="image-btn enhance-cancel-btn">
					<img src="images/btn3.png" alt="">
					<span>戻る</span>
				</div>
				<div class="image-btn enhance-btn">
					<img src="images/btn2.png" alt="">
					<span>決定</span>
				</div>
			</div>
		</div>
	</div>
	<div class="result-modal">
		<div class="result-modal-body">
			<div class="result-title">QUEST RESULT</div>
			<div class="result-content">
			</div>
			<div class="skip">
				<div class="skip-btn">
					<img src="images/btn2.png" alt="">
					<p>スキップ</p>
				</div>
			</div>
		</div>
		<div class="card-select hidden">
			<div class="card-select-title">1枚選択</div>
			<div class="select-cards-area">
			</div>
			<div class="select-skip">
				<div class="select-skip-btn">
					<img src="images/btn2.png" alt="">
					<p>スキップ</p>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
